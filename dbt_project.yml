
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'TF2'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'TF2'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  TF2:
    +pre-hook:
      - "{{ dbt_logging_tf_model_start() }}"
    stage:
      +schema: "STAGE"
      +materialized: table
    core:
      +schema: "CORE"
      v_stg:
        +materialized: view
        +tags: ['core_v_stg']
      incremental:
        +materialized: incremental
    mart:
      +post-hook:
        - "{{ create_latest_version_view() }}"
      +schema: "MART"
      +materialized: table
      dim:
        +materialized: table
      fact:
        +materialized: incremental
      bridge:
        +materialized: table
    testing:
      +schema: "TESTING"
      +materialized: table
  dbt_artifacts:
    +schema: artifact_audit # optional, default is your target schema
seeds:
  TF2:
    class_data:
      +pre-hook:
        - "{{ dbt_logging_tf_model_start() }}"
      +enabled: true
      +full_refresh: true

snapshots:
  TF2:
    +pre-hook: 
      - "{{ dbt_logging_tf_model_start() }}"
    +database: TF2_DBT_DB
    +schema: CORE
    +strategy: check
    +check_cols: ['hash_diff']
    +hard_deletes: 'invalidate'

query-comment:
  comment: "dbt run on {{ run_started_at }}"
  append: true

on-run-start: 
  - "{{ dbt_logging_tf_run_start() }}" 
on-run-end: 
 
  - "{{ dbt_logging_tf_run_end() }}" 
    
    