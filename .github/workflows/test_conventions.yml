name: Test SQL Conventions

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - reopened
      - synchronize  # Run on new commits to PR
  workflow_dispatch:  # Manual trigger always runs conventions on all files, not just changed ones.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git diff

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.0"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install project dependencies
        run: uv sync --all-extras

      - name: Run pytest (all conventions)
        run: uv run pytest -m "conventions"