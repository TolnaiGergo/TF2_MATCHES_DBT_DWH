version: 2

models:
  - name: monthly_performance
    latest_version: 2
    config:
      contract:
        enforce: true
    description: aggregated monthly performance metrics for montgly players.
    columns:
      - name: year
        data_type: int
        description: integer value of year
      - name: month
        data_type: int
        description: integer value of month
      - name: map_name
        data_type: string
        description: map where the matches were played
      - name: total_matches
        data_type: int
        description: total number of matches played in the month on the specified map.
      - name: total_wins
        data_type: int
        description: total number of matches won in the month on the specified map.
      - name: total_losses
        data_type: int
        description: total number of matches lost in the month on the specified map.
      - name: avg_kills
        data_type: float
      - name: avg_deaths
        data_type: float
      - name: avg_damage
        data_type: float
    
    versions:
      - v: 1
        config:
          enabled: false
      - v: 2
        columns:
          - include: all
          - name: avg_support
            data_type: float
            description: average support rate

          - name: player_name
            data_type: string
            description: the name of the player that stats are listed.

exposures:
  - name: monthly_performance_dashboard
    description: looker dashboard for monthly wins lossses total matches on different maps
    type: dashboard
    url: https://lookerstudio.google.com/reporting/92c3e699-f1e5-4bfe-9d36-c0d3df2617bd
    maturity: high
    owner: 
      name: Tolnai Gergo
      email: gergotolnai001@gmail.com
    
    depends_on:
      - ref('monthly_performance', v=2)

      