version: 2

models:
  - name: monthly_performance
    config:
      contract:
        enforce: true
    description: aggregated monthly performance metrics for montgly players.
    columns:
      - name: year
        description: integer value of year
      - name: month
        description: integer value of month
      - name: map_name
        description: map where the matches were played
      - name: total_matches
        description: total number of matches played in the month on the specified map.
      - name: total_wins
        description: total number of matches won in the month on the specified map.
      - name: total_losses
        description: total number of matches lost in the month on the specified map.